name: ewu_assistant
description: "EWU Voice Assistant & Campus Hub"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  google_fonts: ^8.0.2
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  permission_handler: ^12.0.1
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  google_sign_in: ^6.3.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/logo_mark.png
