name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Prepare clean Space contents
        run: |
          rm -rf space_sync
          mkdir space_sync
          cp -r backend space_sync/backend
          cp Dockerfile space_sync/
          cp README.md space_sync/ || true
          cp .gitattributes space_sync/ || true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd space_sync
          git init
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git branch -M main
          git add .
          git commit -m "Sync backend to Hugging Face Space" || echo "No changes to commit"
          git remote add origin https://oauth2:${HF_TOKEN}@huggingface.co/spaces/niloy21/mobile_app
          git push --force origin main